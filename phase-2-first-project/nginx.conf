# ─────────────────────────────────────────────
# Nginx config for bare-metal install on the VM
# File goes to: /etc/nginx/sites-available/default
# ─────────────────────────────────────────────

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # The folder where your HTML file lives
    root /var/www/html;

    # Default file to serve
    index index.html;

    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }
}
